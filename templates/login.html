<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Login | Stati Group</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0A192F] min-h-screen flex items-center justify-center p-6 font-sans">
    <div class="w-full max-w-md bg-white p-10 rounded-xl shadow-2xl border-t-4 border-[#D4AF37]">
        <div class="text-center mb-8">
            <h1 class="text-[#0A192F] font-black text-2xl tracking-tight">STATI GROUP</h1>
            <p class="text-[#D4AF37] text-[10px] font-bold uppercase tracking-[0.2em]">Secure Admin Portal</p>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div class="bg-red-50 text-red-500 text-xs font-bold p-3 rounded-md mb-6 text-center border border-red-100">{{ messages[0] }}</div>
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST" class="space-y-5">
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Username</label>
                <input type="text" name="username" required class="w-full p-3 border border-gray-200 rounded-md bg-gray-50 mt-1 outline-none focus:border-[#D4AF37]">
            </div>
            <div>
                <label class="text-xs font-bold text-gray-500 uppercase">Password</label>
                <input type="password" name="password" required class="w-full p-3 border border-gray-200 rounded-md bg-gray-50 mt-1 outline-none focus:border-[#D4AF37]">
            </div>
            <button class="w-full bg-[#D4AF37] text-[#0A192F] font-black py-4 rounded-md uppercase tracking-wide hover:opacity-90 transition mt-4">Secure Login</button>
        </form>
        <div class="text-center mt-6">
            <a href="/" class="text-xs text-gray-400 hover:text-[#0A192F]">← Back to Main Website</a>
        </div>
    </div>
</body>
</html>
