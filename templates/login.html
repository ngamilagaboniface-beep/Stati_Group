<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Stati Group Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-6">
    <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md">
        <h2 class="text-3xl font-black mb-10 text-slate-900">Admin Login</h2>
        {% with messages = get_flashed_messages() %}
          {% if messages %}<p class="bg-red-50 text-red-600 p-4 rounded-xl text-[10px] font-black uppercase mb-6">{{ messages[0] }}</p>{% endif %}
        {% endwith %}
        <form action="/login" method="POST" class="space-y-4">
            <input type="text" name="username" placeholder="Username" required class="w-full p-5 border rounded-2xl outline-none font-bold">
            <input type="password" name="password" placeholder="Password" required class="w-full p-5 border rounded-2xl outline-none font-bold">
            <button class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl">Sign In</button>
        </form>
    </div>
</body>
</html>
