<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stati Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="container mx-auto">
        <div class="flex justify-between items-center mb-10 bg-slate-900 text-white p-8 rounded-[2rem]">
            <h1 class="text-2xl font-black italic">ADMIN CONTROL</h1>
            <a href="/logout" class="text-xs font-bold uppercase tracking-widest text-slate-400">Logout</a>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
            <div class="bg-white p-8 rounded-[2rem] shadow-sm border">
                <h2 class="text-xl font-black mb-8 border-b pb-4">Client Inquiries</h2>
                <div class="space-y-6">
                    {% for i in inquiries %}
                    <div class="p-6 bg-slate-50 rounded-2xl border">
                        <div class="flex justify-between mb-2">
                            <span class="font-black text-slate-900 uppercase text-xs">{{ i.customer_name }}</span>
                            <span class="text-[9px] font-bold text-slate-400">{{ i.timestamp.strftime('%Y-%m-%d') }}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-600">📞 {{ i.customer_phone }} | 📧 {{ i.customer_email }}</p>
                        <div class="mt-4 p-4 bg-white rounded-xl border">
                            <p class="text-[9px] font-black text-yellow-600 uppercase mb-2">Interested in:</p>
                            <p class="text-xs font-medium">{{ i.selected_plots }}</p>
                        </div>
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-sm border h-fit">
                <h2 class="text-xl font-black mb-8 border-b pb-4">Add Plot Listing</h2>
                <form action="/admin/upload" method="POST" class="space-y-4">
                    <input type="text" name="title" placeholder="Listing Title" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm">
                    <input type="text" name="location" placeholder="Area (Goba, Masaki...)" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm">
                    <input type="text" name="type" placeholder="Type (Residential / Commercial)" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm">
                    <input type="number" name="price" placeholder="Price (TZS)" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm">
                    <input type="text" name="image_url" placeholder="Direct Image Link" required class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm">
                    <textarea name="features" placeholder="Plot Features..." class="w-full p-4 bg-slate-50 border rounded-xl outline-none font-bold text-sm h-24"></textarea>
                    <button class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase text-[10px]">Publish Listing</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
