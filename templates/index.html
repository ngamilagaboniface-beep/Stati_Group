<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stati Group | Plot Selection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .bg-stati-blue { background-color: #0A192F; }
        .text-stati-gold { color: #D4AF37; }
    </style>
</head>
<body class="bg-slate-50">

    <nav class="bg-white border-b p-6 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-black text-2xl text-stati-blue italic">STATI GROUP</h1>
            <button onclick="toggleCart()" class="relative bg-stati-blue text-white px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">
                Cart (<span id="cart-count">0</span>)
            </button>
        </div>
    </nav>

    <section class="py-20 container mx-auto px-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            {% for p in properties %}
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                <img src="{{ p.image_url }}" class="w-full h-48 object-cover rounded-2xl mb-4">
                <h3 class="font-black text-stati-blue text-lg">{{ p.title }}</h3>
                <p class="text-slate-400 text-xs mb-4 uppercase">{{ p.location }}</p>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-stati-blue">{{ "{:,.0f}".format(p.price) }} TZS</span>
                    <button onclick="addToCart('{{ p.title }}')" class="bg-stati-gold text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase">Add to Cart</button>
                </div>
            </div>
            {% endfor %}
        </div>
    </section>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-full md:w-96 bg-white shadow-2xl z-[100] transform translate-x-full transition-transform duration-300 p-8 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="font-black text-xl text-stati-blue">Your Selection</h2>
            <button onclick="toggleCart()" class="text-slate-400 text-xs font-bold uppercase">Close</button>
        </div>

        <div id="cart-items" class="space-y-4 mb-10">
            <p class="text-slate-400 text-sm italic">No plots selected yet...</p>
        </div>

        <div class="border-t pt-8">
            <h3 class="font-black text-sm uppercase text-stati-gold mb-6">Send Inquiry</h3>
            <form action="/send_inquiry" method="POST" class="space-y-4">
                <input type="hidden" name="cart_data" id="cart_data">
                <input type="text" name="name" placeholder="Full Name" required class="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm">
                <input type="email" name="email" placeholder="Email Address" required class="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm">
                <input type="text" name="phone" placeholder="Phone (e.g. 0797...)" required class="w-full p-4 bg-slate-50 rounded-xl outline-none text-sm">
                <button type="submit" class="w-full bg-stati-blue text-white py-5 rounded-xl font-black uppercase tracking-widest text-xs">Send Details to Stati Group</button>
            </form>
        </div>
    </div>

    <script>
        let cart = [];

        function addToCart(title) {
            if(!cart.includes(title)) {
                cart.push(title);
                updateCartUI();
                alert(title + " added to selection.");
            }
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            const count = document.getElementById('cart-count');
            const hiddenInput = document.getElementById('cart_data');
            
            count.innerText = cart.length;
            hiddenInput.value = cart.join(', ');

            if(cart.length === 0) {
                container.innerHTML = '<p class="text-slate-400 text-sm italic">No plots selected...</p>';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="bg-slate-50 p-4 rounded-xl flex justify-between items-center">
                    <span class="font-bold text-xs text-stati-blue uppercase">${item}</span>
                    <button onclick="removeFromCart('${item}')" class="text-red-500 text-[10px] font-bold">Remove</button>
                </div>
            `).join('');
        }

        function removeFromCart(title) {
            cart = cart.filter(item => item !== title);
            updateCartUI();
        }
    </script>
</body>
</html>
